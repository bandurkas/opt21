version: '3.8'

services:
  collector:
    build: .
    container_name: options-collector
    volumes:
      - ./data.sqlite:/app/data.sqlite
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  radar:
    build: .
    container_name: options-radar
    volumes:
      - ./data.sqlite:/app/data.sqlite
      - ./admins.json:/app/admins.json
    environment:
      - PYTHONUNBUFFERED=1
    command: python radar_bot.py
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: .
    container_name: options-dashboard
    volumes:
      - ./data.sqlite:/app/data.sqlite
      - ./dashboard:/app/dashboard
    ports:
      - "8080:8080"
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port 8080
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  h1-bot:
    build: .
    container_name: options-h1-bot
    volumes:
      - ./data.sqlite:/app/data.sqlite
    environment:
      - PYTHONUNBUFFERED=1
    command: python h1_bot.py
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  h2-bot:
    build: .
    container_name: options-h2-bot
    volumes:
      - ./data.sqlite:/app/data.sqlite
    environment:
      - PYTHONUNBUFFERED=1
    command: python h2_bot.py
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  h3-bot:
    build: .
    container_name: options-h3-bot
    volumes:
      - ./data.sqlite:/app/data.sqlite
    environment:
      - PYTHONUNBUFFERED=1
    command: python h3_bot.py
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
