version: '3.8'

services:
  collector:
    build: .
    container_name: options-collector
    volumes:
      - ./data.sqlite:/app/data.sqlite
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  radar:
    build: .
    container_name: options-radar
    volumes:
      - ./data.sqlite:/app/data.sqlite
      - ./admins.json:/app/admins.json
    command: python radar_bot.py
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: .
    container_name: options-dashboard
    volumes:
      - ./data.sqlite:/app/data.sqlite
      - ./dashboard:/app/dashboard
    ports:
      - "8080:8080"
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port 8080
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
