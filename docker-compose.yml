services:
  collector:
    build: .
    container_name: options-collector
    volumes:
      - ./data.sqlite:/app/data.sqlite
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  analytics:
    # Reuses the collector image (already has pandas/numpy); code is mounted so updates
    # need only a restart, no rebuild (VPS is 1-CPU x86). Dockerfile also bakes these in
    # for a clean `docker compose build` from scratch.
    image: opt21-collector:latest
    container_name: options-analytics
    volumes:
      - ./data.sqlite:/app/data.sqlite
      - ./analytics_collector.py:/app/analytics_collector.py
      - ./analytics_schema.sql:/app/analytics_schema.sql
    environment:
      - PYTHONUNBUFFERED=1
    command: python analytics_collector.py
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: .
    container_name: options-dashboard
    volumes:
      - ./data.sqlite:/app/data.sqlite
      - ./dashboard:/app/dashboard
    ports:
      - "8080:8080"
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port 8080
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
